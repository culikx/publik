<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Player v3 Control</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
  body { background: #0f0f0f; color: #fff; }
  .video-container {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    border-radius: 12px;
    overflow: hidden;
  }
  .video-container iframe {
    position: absolute;
    width: 100%; height: 100%;
    border: 0;
  }
  .controls button { min-width: 48px; }
</style>
</head>
<body>
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      
      <div id="player" class="video-container mb-3"></div>

      <div class="controls d-flex flex-wrap gap-2 align-items-center">
        <button id="play" class="btn btn-success"><i class="bi bi-play-fill"></i></button>
        <button id="pause" class="btn btn-warning"><i class="bi bi-pause-fill"></i></button>
        <button id="stop" class="btn btn-danger"><i class="bi bi-stop-fill"></i></button>
        
        <input type="range" id="seek" min="0" max="100" value="0" class="form-range flex-grow-1">
        
        <button id="mute" class="btn btn-secondary"><i class="bi bi-volume-up-fill"></i></button>
        <input type="range" id="volume" min="0" max="100" value="100" class="form-range" style="width: 120px;">
      </div>

      <p class="mt-2 text-secondary small">
        Waktu: <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
      </p>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Ambil ?v= dari URL
  const videoId = new URLSearchParams(window.location.search).get('v') || 'dQw4w9WgXcQ';

  let player;
  
  // Load API
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      videoId: videoId,
      playerVars: { 
        controls: 0, 
        rel: 0, 
        modestbranding: 1,
        enablejsapi: 1 
      },
      events: {
        'onReady': onPlayerReady,
        'onStateChange': onPlayerStateChange
      }
    });
  }

  function onPlayerReady(e) {
    document.getElementById('duration').textContent = formatTime(player.getDuration());
    document.getElementById('seek').max = player.getDuration();
    setInterval(updateProgress, 500);
  }

  function onPlayerStateChange(e) {
    if (e.data === YT.PlayerState.PLAYING) {
      document.getElementById('duration').textContent = formatTime(player.getDuration());
    }
  }

  // Controls
  document.getElementById('play').onclick = () => player.playVideo();
  document.getElementById('pause').onclick = () => player.pauseVideo();
  document.getElementById('stop').onclick = () => player.stopVideo();

  document.getElementById('mute').onclick = () => {
    if (player.isMuted()) {
      player.unMute();
      document.getElementById('mute').innerHTML = '<i class="bi bi-volume-up-fill"></i>';
    } else {
      player.mute();
      document.getElementById('mute').innerHTML = '<i class="bi bi-volume-mute-fill"></i>';
    }
  };

  document.getElementById('volume').oninput = (e) => {
    player.setVolume(e.target.value);
  };

  document.getElementById('seek').oninput = (e) => {
    player.seekTo(e.target.value, true);
  };

  function updateProgress() {
    if (player && player.getCurrentTime) {
      const time = player.getCurrentTime();
      document.getElementById('currentTime').textContent = formatTime(time);
      document.getElementById('seek').value = time;
    }
  }

  function formatTime(sec) {
    sec = Math.floor(sec);
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}:${s.toString().padStart(2, '0')}`;
  }
</script>
</body>
</html>
