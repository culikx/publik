<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
  body { 
    background: #0f0f0f; 
    color: #fff; 
    transition: background 0.5s ease;
  }
  
  .player-wrapper {
    background: #7a0f1c; /* default, bakal diganti JS */
    border-radius: 16px;
    padding: 24px 20px;
    transition: background 0.5s ease;
    backdrop-filter: blur(10px);
  }

  .ratio-16x9 {
    border-radius: 12px;
    overflow: hidden;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
  }
  
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 50%;
    cursor: pointer;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 20px;
  }
  
  .controls button {
    background: transparent;
    border: none;
    color: #fff;
    font-size: 24px;
    padding: 8px;
  }
  
  .play-btn {
    width: 64px;
    height: 64px;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px !important;
  }
</style>
</head>
<body>
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      
      <div class="player-wrapper" id="playerWrapper">
        <div class="ratio ratio-16x9 mb-3">
          <div id="player"></div>
        </div>

        <div class="d-flex align-items-center gap-3">
          <span id="currentTime">00:00</span>
          <input type="range" id="seek" min="0" max="100" value="0">
          <span id="duration">00:00</span>
        </div>

        <div class="controls">
          <button id="repeat"><i class="bi bi-arrow-repeat"></i></button>
          <button id="prev"><i class="bi bi-skip-backward-fill"></i></button>
          <button id="playPause" class="play-btn"><i class="bi bi-play-fill"></i></button>
          <button id="next"><i class="bi bi-skip-forward-fill"></i></button>
          <button id="playlist"><i class="bi bi-list"></i></button>
        </div>

        <h6 id="videoTitle" class="mt-3 text-center" style="opacity:0.9"></h6>
      </div>

    </div>
  </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const videoId = new URLSearchParams(window.location.search).get('v') || 'dQw4w9WgXcQ';
  let player, isPlaying = false, isLoop = false;

  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      videoId: videoId,
      playerVars: { controls: 0, rel: 0, modestbranding: 1, enablejsapi: 1 },
      events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
    });
  }

  function onPlayerReady() {
    const data = player.getVideoData();
    document.getElementById('videoTitle').textContent = data.title;
    document.getElementById('duration').textContent = formatTime(player.getDuration());
    document.getElementById('seek').max = player.getDuration();
    
    // Ambil warna dari thumbnail
    extractColorFromThumbnail(videoId);
    
    setInterval(updateProgress, 500);
  }

  function onPlayerStateChange(e) {
    isPlaying = e.data === YT.PlayerState.PLAYING;
    document.getElementById('playPause').innerHTML = 
      isPlaying ? '<i class="bi bi-pause-fill"></i>' : '<i class="bi bi-play-fill"></i>';
    
    // Update title tag pas play
    if (isPlaying) {
      const title = player.getVideoData().title;
      document.title = title;
    }
    
    if (e.data === YT.PlayerState.ENDED && isLoop) {
      player.seekTo(0);
      player.playVideo();
    }
  }

  function extractColorFromThumbnail(id) {
    const img = new Image();
    img.crossOrigin = "Anonymous";
    img.src = `https://i.ytimg.com/vi/${id}/mqdefault.jpg`;
    
    img.onload = () => {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      
      const data = ctx.getImageData(0, 0, img.width, img.height).data;
      let r = 0, g = 0, b = 0, count = 0;
      
      // Ambil warna rata-rata, skip pixel terlalu terang/gelap
      for (let i = 0; i < data.length; i += 40) {
        const R = data[i], G = data[i+1], B = data[i+2];
        const brightness = (R + G + B) / 3;
        if (brightness > 30 && brightness < 200) {
          r += R; g += G; b += B; count++;
        }
      }
      
      r = Math.floor(r / count);
      g = Math.floor(g / count);
      b = Math.floor(b / count);
      
      // Darken biar kontras sama teks putih
      r = Math.floor(r * 0.4);
      g = Math.floor(g * 0.4);
      b = Math.floor(b * 0.4);
      
      const bgColor = `rgb(${r}, ${g}, ${b})`;
      document.getElementById('playerWrapper').style.background = bgColor;
      document.body.style.background = `rgb(${Math.floor(r*0.6)}, ${Math.floor(g*0.6)}, ${Math.floor(b*0.6)})`;
    };
    
    img.onerror = () => console.log('Gagal ambil thumbnail color');
  }

  document.getElementById('playPause').onclick = () => {
    isPlaying ? player.pauseVideo() : player.playVideo();
  };

  document.getElementById('repeat').onclick = () => {
    isLoop = !isLoop;
    document.getElementById('repeat').style.opacity = isLoop ? '1' : '0.5';
  };

  document.getElementById('prev').onclick = () => player.seekTo(player.getCurrentTime() - 10);
  document.getElementById('next').onclick = () => player.seekTo(player.getCurrentTime() + 10);
  
  document.getElementById('seek').oninput = (e) => {
    player.seekTo(e.target.value, true);
  };

  function updateProgress() {
    if (player && player.getCurrentTime) {
      const time = player.getCurrentTime();
      document.getElementById('currentTime').textContent = formatTime(time);
      document.getElementById('seek').value = time;
    }
  }

  function formatTime(sec) {
    sec = Math.floor(sec);
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  }
</script>
</body>
</html>
