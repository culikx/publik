<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Player</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
  body {
    background: #0f0f0f;
    color: #fff;
  }
  .video-container {
    position: relative;
    padding-bottom: 56.25%; /* 16:9 */
    height: 0;
    overflow: hidden;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .video-container iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }
  .video-info {
    margin-top: 16px;
  }
</style>
</head>
<body>
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-9">
      
      <div class="video-container" id="player"></div>

      <div class="video-info d-flex align-items-center gap-2 mt-3">
        <i class="bi bi-play-circle-fill text-danger fs-3"></i>
        <div>
          <h5 class="mb-0" id="videoIdText">Video ID: -</h5>
          <small class="text-secondary">Paste link YouTube dengan ?v=VIDEO_ID</small>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Ambil parameter ?v= dari URL
  function getVideoId() {
    const params = new URLSearchParams(window.location.search);
    return params.get('v');
  }

  const videoId = getVideoId();
  document.getElementById('videoIdText').textContent = `Video ID: ${videoId || 'Tidak ditemukan'}`;

  // Load YouTube IFrame API
  let tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  // Fungsi ini dipanggil otomatis sama YouTube API
  function onYouTubeIframeAPIReady() {
    if (!videoId) return;
    
    new YT.Player('player', {
      videoId: videoId,
      playerVars: {
        modestbranding: 1,
        rel: 0,
        showinfo: 0
      }
    });
  }

  // Fallback kalau API gagal load, pakai iframe biasa
  if (videoId) {
    window.addEventListener('load', () => {
      setTimeout(() => {
        if (!window.YT) {
          document.getElementById('player').innerHTML = 
            `<iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>`;
        }
      }, 2000);
    });
  }
</script>
</body>
</html>
