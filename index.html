<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Player Responsive</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
  body { background: #0f0f0f; color: #fff; }
</style>
</head>
<body>
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-9">
      
      <!-- Bootstrap Ratio 16x9 -->
      <div class="ratio ratio-16x9 rounded-3 overflow-hidden shadow-lg">
        <div id="player"></div>
      </div>

      <!-- Title & Controls -->
      <div class="mt-3">
        <h5 id="videoTitle" class="mb-2">
          <i class="bi bi-play-circle-fill text-danger me-2"></i>Loading...
        </h5>
        
        <div class="d-flex gap-2">
          <button id="play" class="btn btn-outline-light btn-sm"><i class="bi bi-play-fill"></i> Play</button>
          <button id="pause" class="btn btn-outline-light btn-sm"><i class="bi bi-pause-fill"></i> Pause</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const videoId = new URLSearchParams(window.location.search).get('v') || 'dQw4w9WgXcQ';
  
  // Load YouTube API
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  let player;

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      videoId: videoId,
      playerVars: { 
        controls: 1, 
        rel: 0, 
        modestbranding: 1 
      },
      events: {
        'onReady': onPlayerReady
      }
    });
  }

  function onPlayerReady() {
    // Ambil title video
    const videoData = player.getVideoData();
    document.getElementById('videoTitle').innerHTML = 
      `<i class="bi bi-play-circle-fill text-danger me-2"></i>${videoData.title}`;
    
    document.title = videoData.title + ' - YouTube Player';
  }

  // Control buttons
  document.getElementById('play').onclick = () => player.playVideo();
  document.getElementById('pause').onclick = () => player.pauseVideo();
</script>
</body>
</html>
